<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Admin - Don's TCG (Demo)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #050505;
      --bg-secondary: #0a0a0a;
      --bg-card: #111111;
      --text-primary: #ffffff;
      --text-secondary: #888888;
      --border: #222222;
      --accent: #3b82f6;
      --success: #22c55e;
      --live: #ef4444;
      --warning: #f59e0b;
      --event: #ff6b9d;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo { font-size: 20px; font-weight: 800; }
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
    }
    @media (max-width: 1024px) { .main { grid-template-columns: 1fr; } }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }
    .stat-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
    .stat-value { font-size: 32px; font-weight: 800; }
    
    .demo-banner {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      color: #fbbf24;
      font-size: 14px;
    }
    
    .current-section {
      background: var(--bg-card);
      border: 2px solid var(--success);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .current-section.inactive {
      border-color: var(--border);
      border-style: dashed;
      opacity: 0.6;
    }
    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .current-order {
      background: var(--bg-primary);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
    }
    .current-label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
    .current-user { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .current-product { font-size: 18px; color: var(--text-secondary); margin-bottom: 24px; }

<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Don's TCG Queue</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --border: #2a2a2a;
            --accent: #ffffff;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shopify: #95bf47;
            --info: #3b82f6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
        }
        @media (max-width: 1024px) { .main { grid-template-columns: 1fr; } }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .stat-label { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        
        .waiting-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .waiting-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .waiting-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: all 0.2s;
        }
        .waiting-item:hover {
            border-color: var(--info);
        }
        .queue-position {
            width: 32px;
            height: 32px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-secondary);
        }
        .queue-info { flex: 1; }
        .queue-username { font-weight: 600; margin-bottom: 2px; }
        .queue-product { font-size: 13px; color: var(--text-secondary); }
        .source-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 700;
            margin-right: 8px;
        }
        .source-shopify { background: var(--shopify); color: #000; }
        .source-demo { background: var(--warning); color: #000; }
        .source-manual { background: var(--text-secondary); color: #000; }
        
        .btn-open {
            padding: 8px 16px;
            background: var(--info);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-open:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        
        .current-section {
            background: var(--bg-card);
            border: 2px solid var(--success);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }
        .current-section.inactive {
            border-color: var(--border);
            border-style: dashed;
        }
        .current-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 100px;
            font-size: 13px;
            color: var(--danger);
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .current-order {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .current-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }
        .current-user { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .current-product { font-size: 16px; color: var(--text-secondary); margin-bottom: 20px; }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            margin-right: 8px;
        }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #16a34a; }
        .btn-secondary { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }
        
        .sidebar { display: flex; flex-direction: column; gap: 24px; }
        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }
        .panel-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        
        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
        
        .sync-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sync-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🎴 Don's TCG Admin</div>
        <div>
            <a href="../" style="color: var(--text-secondary); text-decoration: none; margin-right: 16px;">Hemsida</a>
            <a href="../overlay/queue.html" target="_blank" style="color: var(--text-secondary); text-decoration: none;">Overlay</a>
        </div>
    </header>

    <main class="main">
        <div class="content">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Väntar</div>
                    <div class="stat-value" id="stat-waiting">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Klara idag</div>
                    <div class="stat-value" style="color: var(--success);" id="stat-completed">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Est. tid</div>
                    <div class="stat-value" style="color: var(--warning);" id="stat-time">0 min</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Omsättning</div>
                    <div class="stat-value" id="stat-revenue">0 kr</div>
                </div>
            </div>

            <div class="current-section inactive" id="current-section">
                <div class="current-header">
                    <div class="live-indicator" id="live-indicator" style="display: none;">
                        <span class="live-dot"></span>
                        ÖPPNAS NU
                    </div>
                    <div id="current-status" style="color: var(--text-muted); font-size: 13px;">Ingen order öppnas</div>
                </div>
                <div class="current-order" id="current-order" style="display: none;">
                    <div class="current-user" id="current-user">-</div>
                    <div class="current-product" id="current-product">-</div>
                    <div style="margin-top: 20px;">
                        <button class="btn btn-success" onclick="completeCurrent()">✓ Klar - Nästa</button>
                        <button class="btn btn-secondary" onclick="skipCurrent()">→ Skippa</button>
                    </div>
                </div>
            </div>

            <div class="waiting-section">
                <div class="section-title">
                    Kölista (väntar på att öppnas)
                    <span style="font-size: 14px; color: var(--text-secondary);"><span id="waiting-count">0</span> ordrar</span>
                </div>
                <div class="waiting-list" id="waiting-list">
                    <div class="empty-state">
                        <p>Inga ordrar i kö. Lägg till manuellt eller vänta på Shopify-köp.</p>
                    </div>
                </div>
            </div>
        </div>

        <aside class="sidebar">
            <div class="panel">
                <div class="panel-title">Lägg till order manuellt</div>
                <form id="add-form" onsubmit="addOrder(event)">
                    <div class="form-group">
                        <label class="form-label">Användarnamn</label>
                        <input type="text" class="form-input" id="input-username" placeholder="t.ex. @DonTCG" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Produkt</label>
                        <input type="text" class="form-input" id="input-product" placeholder="t.ex. Lost Origin Booster Box" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Pris (kr)</label>
                        <input type="number" class="form-input" id="input-price" placeholder="0" min="0">
                    </div>
                    <button type="submit" class="btn-primary">+ Lägg till i kö</button>
                </form>
            </div>

            <div class="panel">
                <div class="panel-title">Snabbval</div>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <button class="btn btn-secondary" onclick="quickAdd('Lost Origin Booster Box', 1199)" style="text-align: left;">📦 Booster Box — 1,199 kr</button>
                    <button class="btn btn-secondary" onclick="quickAdd('Brilliant Stars ETB', 449)" style="text-align: left;">🎁 ETB — 449 kr</button>
                    <button class="btn btn-secondary" onclick="quickAdd('Single Booster Pack', 45)" style="text-align: left;">🃏 Booster Pack — 45 kr</button>
                </div>
            </div>
        </aside>
    </main>

    <div class="sync-indicator">
        <span class="sync-dot"></span>
        <span id="sync-text">Synkar...</span>
    </div>

    <script>
        let broadcastChannel = null;
        try {
            broadcastChannel = new BroadcastChannel('tcg_queue_channel');
        } catch (e) {
            console.warn('BroadcastChannel inte tillgängligt');
        }
        
        function notifyOtherTabs() {
            if (broadcastChannel) {
                broadcastChannel.postMessage({ type: 'queue-update', timestamp: Date.now() });
            }
            localStorage.setItem('tcg_sync_trigger', Date.now().toString());
        }

        let waitingQueue = JSON.parse(localStorage.getItem('tcg_waiting_queue')) || [];
        let currentOrder = JSON.parse(localStorage.getItem('tcg_current_order')) || null;
        let completed = parseInt(localStorage.getItem('tcg_completed')) || 0;
        let revenue = parseInt(localStorage.getItem('tcg_revenue')) || 0;

        function saveAll() {
            localStorage.setItem('tcg_waiting_queue', JSON.stringify(waitingQueue));
            localStorage.setItem('tcg_current_order', JSON.stringify(currentOrder));
            localStorage.setItem('tcg_completed', completed);
            localStorage.setItem('tcg_revenue', revenue);
            notifyOtherTabs();
        }

        function render() {
            document.getElementById('stat-waiting').textContent = waitingQueue.length;
            document.getElementById('stat-completed').textContent = completed;
            document.getElementById('stat-time').textContent = (waitingQueue.length * 5) + ' min';
            document.getElementById('stat-revenue').textContent = revenue.toLocaleString() + ' kr';
            
            document.getElementById('waiting-count').textContent = waitingQueue.length;
            const waitingList = document.getElementById('waiting-list');
            
            if (waitingQueue.length === 0) {
                waitingList.innerHTML = '<div class="empty-state"><p>Inga ordrar i kö.</p></div>';
            } else {
                waitingList.innerHTML = waitingQueue.map((order, index) => `
                    <div class="waiting-item">
                        <div class="queue-position">${index + 1}</div>
                        <div class="queue-info">
                            <div class="queue-username">${order.username}</div>
                            <div class="queue-product">${order.product}</div>
                        </div>
                        <span class="source-badge source-${order.source || 'manual'}">${order.source === 'shopify' ? 'SHOPIFY' : order.source === 'demo' ? 'DEMO' : 'MANUELL'}</span>
                        <button class="btn-open" onclick="openOrder(${index})">ÖPPNA</button>
                        <button onclick="removeWaiting(${index})" style="background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 8px 12px; border-radius: 6px; cursor: pointer; margin-left: 8px;">🗑</button>
                    </div>
                `).join('');
            }
            
            const currentSection = document.getElementById('current-section');
            const liveIndicator = document.getElementById('live-indicator');
            const currentStatus = document.getElementById('current-status');
            const currentOrderDiv = document.getElementById('current-order');
            
            if (currentOrder) {
                currentSection.classList.remove('inactive');
                currentSection.style.borderColor = 'var(--success)';
                liveIndicator.style.display = 'flex';
                currentStatus.style.display = 'none';
                currentOrderDiv.style.display = 'block';
                document.getElementById('current-user').textContent = currentOrder.username;
                document.getElementById('current-product').textContent = currentOrder.product;
            } else {
                currentSection.classList.add('inactive');
                currentSection.style.borderColor = 'var(--border)';
                liveIndicator.style.display = 'none';
                currentStatus.style.display = 'block';
                currentOrderDiv.style.display = 'none';
            }
            
            saveAll();
        }

        function openOrder(index) {
            if (currentOrder) {
                alert('Du har redan en order som öppnas! Markera den som klar först.');
                return;
            }
            
            currentOrder = waitingQueue.splice(index, 1)[0];
            render();
        }

        // 🎯 AUTOMATISKT hämta nästa när man trycker Klar
        function completeCurrent() {
            if (!currentOrder) return;
            
            revenue += currentOrder.price || 0;
            completed++;
            currentOrder = null;
            
            // Automatiskt hämta nästa i kön om det finns
            if (waitingQueue.length > 0) {
                currentOrder = waitingQueue.shift();
            }
            
            render();
        }

        // 🎯 AUTOMATISKT hämta nästa när man trycker Skippa
        function skipCurrent() {
            if (!currentOrder) return;
            
            // Lägg tillbaka current order i slutet av kön
            waitingQueue.push(currentOrder);
            currentOrder = null;
            
            // Hämta nästa automatiskt om det finns
            if (waitingQueue.length > 0) {
                currentOrder = waitingQueue.shift();
            }
            
            render();
        }

        function removeWaiting(index) {
            if (confirm('Ta bort denna order?')) {
                waitingQueue.splice(index, 1);
                render();
            }
        }

        function addOrder(e) {
            e.preventDefault();
            waitingQueue.push({
                id: Date.now(),
                username: document.getElementById('input-username').value,
                product: document.getElementById('input-product').value,
                price: parseInt(document.getElementById('input-price').value) || 0,
                timestamp: Date.now(),
                source: 'manual'
            });
            document.getElementById('add-form').reset();
            render();
        }

        function quickAdd(product, price) {
            const username = prompt('Användarnamn:');
            if (username) {
                waitingQueue.push({
                    id: Date.now(),
                    username: username.startsWith('@') ? username : '@' + username,
                    product: product,
                    price: price,
                    timestamp: Date.now(),
                    source: 'manual'
                });
                render();
            }
        }

        if (broadcastChannel) {
            broadcastChannel.onmessage = (event) => {
                if (event.data.type === 'queue-update') {
                    waitingQueue = JSON.parse(localStorage.getItem('tcg_waiting_queue')) || [];
                    currentOrder = JSON.parse(localStorage.getItem('tcg_current_order')) || null;
                    completed = parseInt(localStorage.getItem('tcg_completed')) || 0;
                    revenue = parseInt(localStorage.getItem('tcg_revenue')) || 0;
                    render();
                }
            };
        }

        setInterval(() => {
            const newWaiting = JSON.parse(localStorage.getItem('tcg_waiting_queue')) || [];
            const newCurrent = JSON.parse(localStorage.getItem('tcg_current_order')) || null;
            
            if (JSON.stringify(newWaiting) !== JSON.stringify(waitingQueue) ||
                JSON.stringify(newCurrent) !== JSON.stringify(currentOrder)) {
                waitingQueue = newWaiting;
                currentOrder = newCurrent;
                completed = parseInt(localStorage.getItem('tcg_completed')) || 0;
                revenue = parseInt(localStorage.getItem('tcg_revenue')) || 0;
                render();
            }
        }, 2000);

        render();
        document.getElementById('sync-text').textContent = 'Synkad';
    </script>
</body>
</html>

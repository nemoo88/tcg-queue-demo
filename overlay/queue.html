<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Overlay - Don's TCG Queue</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: rgba(10, 10, 10, 0.95);
            --bg-card: rgba(20, 20, 20, 0.98);
            --border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent: #ffffff;
            --live: #ef4444;
            --success: #22c55e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: transparent;
            color: var(--text-primary);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        .overlay-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }
        .overlay-header {
            background: var(--bg-card);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; }
        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            color: var(--live);
        }
        .live-dot {
            width: 6px;
            height: 6px;
            background: var(--live);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .current-section {
            padding: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
        }
        .current-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
        .current-user { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .current-product { font-size: 13px; color: var(--text-secondary); }
        .now-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 4px 10px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            color: var(--success);
        }
        .queue-section {
            padding: 16px 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .queue-title {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        .queue-list { display: flex; flex-direction: column; gap: 8px; }
        .queue-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
        }
        .queue-position {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
        }
        .queue-username { font-size: 13px; font-weight: 600; }
        .queue-product { font-size: 11px; color: var(--text-secondary); }
        .stats-footer {
            padding: 12px 20px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
        }
        .empty-state { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 12px; }
        .sync-status {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            padding: 4px 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="overlay-container">
        <div class="overlay-header">
            <div class="brand">🎴 DON'S TCG</div>
            <div class="live-badge"><span class="live-dot"></span>LIVE</div>
        </div>
        
        <div class="current-section">
            <div class="current-label">Nu öppnas</div>
            <div class="current-user" id="current-user">Väntar...</div>
            <div class="current-product" id="current-product">-</div>
            <div class="now-indicator" id="now-indicator" style="display: none;">✓ LIVE NU</div>
        </div>
        
        <div class="queue-section">
            <div class="queue-title">Nästa i kö <span id="queue-count">0</span></div>
            <div class="queue-list" id="queue-list"><div class="empty-state">Ingen kö</div></div>
        </div>
        
        <div class="stats-footer">
            <div>⏱ Est. <span id="est-time">0 min</span></div>
            <div>✓ Klara: <span id="completed-count">0</span></div>
        </div>
    </div>
    
    <div class="sync-status" id="sync-status">Sync: waiting...</div>

    <script>
        let queue = [];
        let completed = 0;
        let channel = null;
        
        function initBroadcastChannel() {
            try {
                channel = new BroadcastChannel('tcg_queue_channel');
                channel.onmessage = (event) => {
                    if (event.data.type === 'queue-update') {
                        loadFromStorage();
                    }
                };
                document.getElementById('sync-status').textContent = 'Sync: OK';
            } catch (e) {
                document.getElementById('sync-status').textContent = 'Sync: polling';
            }
        }
        
        function loadFromStorage() {
            try {
                const savedQueue = localStorage.getItem('tcg_queue');
                const savedCompleted = localStorage.getItem('tcg_completed');
                
                if (savedQueue) queue = JSON.parse(savedQueue);
                if (savedCompleted) completed = parseInt(savedCompleted);
                
                render();
            } catch (e) {
                console.error('Fel:', e);
            }
        }
        
        function render() {
            const currentUser = document.getElementById('current-user');
            const currentProduct = document.getElementById('current-product');
            const nowIndicator = document.getElementById('now-indicator');
            
            if (queue.length > 0) {
                const order = queue[0];
                currentUser.textContent = order.username || 'Okänd';
                currentProduct.textContent = order.product || '-';
                nowIndicator.style.display = 'inline-flex';
            } else {
                currentUser.textContent = 'Väntar på order...';
                currentProduct.textContent = '-';
                nowIndicator.style.display = 'none';
            }
            
            const remaining = Math.max(0, queue.length - 1);
            document.getElementById('queue-count').textContent = remaining + ' personer';
            
            const queueList = document.getElementById('queue-list');
            if (remaining === 0) {
                queueList.innerHTML = '<div class="empty-state">Ingen kö just nu</div>';
            } else {
                queueList.innerHTML = queue.slice(1, 6).map((order, index) => `
                    <div class="queue-item">
                        <div class="queue-position">${index + 1}</div>
                        <div>
                            <div class="queue-username">${order.username || 'Okänd'}</div>
                            <div class="queue-product">${order.product || '-'}</div>
                        </div>
                    </div>
                `).join('');
            }
            
            document.getElementById('est-time').textContent = (remaining * 5) + ' min';
            document.getElementById('completed-count').textContent = completed;
        }
        
        window.addEventListener('storage', (event) => {
            if (event.key === 'tcg_queue' || event.key === 'tcg_completed') {
                loadFromStorage();
            }
        });
        
        setInterval(loadFromStorage, 3000);
        
        initBroadcastChannel();
        loadFromStorage();
    </script>
</body>
</html>

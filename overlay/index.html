<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>OBS Overlay - Don's TCG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: rgba(5, 5, 5, 0.95);
      --bg-card: rgba(17, 17, 17, 0.98);
      --border: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --accent: #3b82f6;
      --live: #ef4444;
      --event: #ff6b9d; /* Rosa för alla event-typer */
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      color: var(--text-primary);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    .overlay-container {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 260px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(20px);
    }
    
    /* Header */
    .overlay-header {
      background: var(--bg-card);
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .brand { 
      font-weight: 800; 
      font-size: 12px; 
      letter-spacing: 0.5px; 
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .brand-icon {
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 20px;
      font-size: 9px;
      font-weight: 800;
      color: var(--live);
      text-transform: uppercase;
    }
    .live-dot {
      width: 5px;
      height: 5px;
      background: var(--live);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    
    /* Current Section */
    .current-section {
      padding: 12px 14px;
      background: linear-gradient(180deg, rgba(59, 130, 246, 0.06) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .current-section.inactive { 
      background: transparent; 
      opacity: 0.6; 
    }
    .current-section.event { /* Rosa för alla event */
      background: linear-gradient(180deg, rgba(255, 107, 157, 0.06) 0%, transparent 100%);
    }
    .section-label {
      font-size: 9px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .current-user { 
      font-size: 15px; 
      font-weight: 800; 
      margin-bottom: 2px;
      letter-spacing: -0.3px;
    }
    .current-product { 
      font-size: 11px; 
      color: var(--text-secondary); 
      margin-bottom: 6px;
    }
    /* EVENT badge - för alla event-typer */
    .event-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      background: rgba(255, 107, 157, 0.15);
      color: var(--event);
      border: 1px solid rgba(255, 107, 157, 0.3);
    }
    
    /* Queue Section */
    .queue-section { 
      flex: 1; 
    }
    .queue-header {
      padding: 10px 14px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    .queue-title { 
      font-size: 9px; 
      color: var(--text-secondary); 
      text-transform: uppercase; 
      letter-spacing: 1.5px; 
      font-weight: 700; 
    }
    .queue-count {
      font-size: 10px;
      color: var(--text-primary);
      font-weight: 800;
      background: rgba(59, 130, 246, 0.2);
      padding: 2px 6px;
      border-radius: 10px;
    }
    .queue-list { 
      padding: 6px; 
    }
    
    /* Queue Items */
    .queue-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      margin-bottom: 3px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .queue-item.event {
      border-color: rgba(255, 107, 157, 0.3);
      background: rgba(255, 107, 157, 0.05);
    }
    .queue-position {
      width: 22px;
      height: 22px;
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: var(--accent);
      flex-shrink: 0;
    }
    .queue-position.event {
      background: rgba(255, 107, 157, 0.2);
      border-color: var(--event);
      color: var(--event);
    }
    .queue-info { 
      flex: 1; 
      min-width: 0;
    }
    .queue-username { 
      font-size: 12px;
      font-weight: 700; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      line-height: 1.2;
    }
    .queue-product { 
      font-size: 10px;
      color: var(--text-secondary); 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      line-height: 1.2;
    }
    
    /* Footer */
    .stats-footer {
      padding: 10px 14px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--text-secondary);
    }
    .stat-item { display: flex; align-items: center; gap: 5px; }
    .stat-value { color: var(--text-primary); font-weight: 800; }
    
    .empty-state { 
      text-align: center; 
      padding: 16px 14px; 
      color: var(--text-secondary); 
      font-size: 11px; 
    }
    .demo-notice {
      position: fixed;
      bottom: 8px;
      right: 8px;
      font-size: 8px;
      color: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <div class="overlay-container">
    <div class="overlay-header">
      <div class="brand">
        <div class="brand-icon">🎴</div>
        DON'S TCG
      </div>
      <div class="live-badge">
        <span class="live-dot"></span>
        LIVE
      </div>
    </div>
    
    <!-- Nuvarande order -->
    <div class="current-section" id="current-section">
      <div class="section-label">Nu öppnas</div>
      <div class="current-user" id="current-user">@väntar...</div>
      <div class="current-product" id="current-product">Ingen order öppnas just nu</div>
      <!-- EVENT badge - visas bara för event -->
      <span class="event-badge" id="event-badge" style="display: none;">🎉 EVENT</span>
    </div>
    
    <div class="queue-section">
      <div class="queue-header">
        <span class="queue-title">Nästa i kö</span>
        <span class="queue-count" id="queue-count">0</span>
      </div>
      <div class="queue-list" id="queue-list">
        <div class="empty-state">Ingen kö just nu</div>
      </div>
    </div>
    
    <div class="stats-footer">
      <div class="stat-item">
        <span>⏱</span>
        <span>Est. <span class="stat-value" id="est-time">0 min</span></span>
      </div>
      <div class="stat-item">
        <span>✓</span>
        <span>Klara: <span class="stat-value" id="completed-count">0</span></span>
      </div>
    </div>
  </div>
  
  <div class="demo-notice">demo</div>

  <script>
    let waitingQueue = [];
    let currentOrder = null;
    let completed = 0;

    function loadFromStorage() {
      try {
        waitingQueue = JSON.parse(localStorage.getItem('tcg_waiting_queue')) || [];
        currentOrder = JSON.parse(localStorage.getItem('tcg_current_order')) || null;
        completed = parseInt(localStorage.getItem('tcg_completed')) || 0;
        render();
      } catch (e) {
        console.error('Error:', e);
      }
    }

    function render() {
      const currentSection = document.getElementById('current-section');
      const currentUser = document.getElementById('current-user');
      const currentProduct = document.getElementById('current-product');
      const eventBadge = document.getElementById('event-badge');
      
      if (currentOrder) {
        currentSection.classList.remove('inactive');
        
        // Visa EVENT badge för alla event-typer (duck, giveaway, packbattle, etc.)
        if (currentOrder.type === 'event' || currentOrder.type === 'duck') {
          currentSection.classList.add('event');
          eventBadge.style.display = 'inline-flex';
        } else {
          currentSection.classList.remove('event');
          eventBadge.style.display = 'none';
        }
        
        currentUser.textContent = currentOrder.username || '@alla';
        currentProduct.textContent = currentOrder.product || '-';
      } else {
        currentSection.classList.add('inactive');
        currentSection.classList.remove('event');
        eventBadge.style.display = 'none';
        currentUser.textContent = '@väntar...';
        currentProduct.textContent = 'Ingen order öppnas just nu';
      }
      
      document.getElementById('queue-count').textContent = waitingQueue.length;
      const queueList = document.getElementById('queue-list');
      
      if (waitingQueue.length === 0) {
        queueList.innerHTML = '<div class="empty-state">Ingen kö just nu</div>';
      } else {
        // Visa alla i kön (inklusive event)
        const displayQueue = waitingQueue.filter(order => {
          // Visa om: inte duck/event, ELLER manuellt tillagd
          return (order.type !== 'duck' && order.type !== 'event') || order.manualEvent === true || order.manualDuck === true;
        });
        
        if (displayQueue.length === 0) {
          queueList.innerHTML = '<div class="empty-state">Endast auto-ordrar</div>';
        } else {
          queueList.innerHTML = displayQueue.slice(0, 4).map((order, index) => `
            <div class="queue-item ${(order.type === 'duck' || order.type === 'event') ? 'event' : ''}">
              <div class="queue-position ${(order.type === 'duck' || order.type === 'event') ? 'event' : ''}">${index + 1}</div>
              <div class="queue-info">
                <div class="queue-username">${order.username || '@alla'}</div>
                <div class="queue-product">${order.product}</div>
              </div>
            </div>
          `).join('');
        }
      }
      
      // Beräkna est. tid (bara Rip n Ship, inte event)
      const ripShipCount = waitingQueue.filter(o => o.type !== 'duck' && o.type !== 'event').length;
      document.getElementById('est-time').textContent = (ripShipCount * 5) + ' min';
      document.getElementById('completed-count').textContent = completed;
    }

    window.addEventListener('storage', (event) => {
      if (event.key === 'tcg_waiting_queue' || event.key === 'tcg_current_order' || event.key === 'tcg_completed') {
        loadFromStorage();
      }
    });

    setInterval(loadFromStorage, 2000);
    loadFromStorage();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBS Overlay - Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: rgba(10, 10, 10, 0.95);
      --bg-card: rgba(26, 26, 26, 0.98);
      --border: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --accent: #3b82f6;
      --live: #ef4444;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      color: var(--text-primary);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    
    .overlay-container {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 280px;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(20px);
    }
    
    .overlay-header {
      background: var(--bg-card);
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .brand { 
      font-weight: 800; 
      font-size: 12px; 
      letter-spacing: 0.5px; 
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .brand-icon {
      width: 16px;
      height: 16px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    
    .live-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 20px;
      font-size: 9px;
      font-weight: 800;
      color: var(--live);
      text-transform: uppercase;
    }
    
    .live-dot {
      width: 5px;
      height: 5px;
      background: var(--live);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    
    .current-section {
      padding: 14px;
      background: linear-gradient(180deg, rgba(59, 130, 246, 0.06) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    
    .current-section.inactive { 
      background: transparent; 
      opacity: 0.6; 
    }
    
    .section-label {
      font-size: 9px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
      font-weight: 700;
    }
    
    .current-user { 
      font-size: 16px; 
      font-weight: 800; 
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    
    .current-products {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .current-product-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .product-icon {
      font-size: 11px;
    }
    
    .queue-section { 
      flex: 1; 
    }
    
    .queue-header {
      padding: 10px 14px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    
    .queue-title { 
      font-size: 9px; 
      color: var(--text-secondary); 
      text-transform: uppercase; 
      letter-spacing: 1.5px; 
      font-weight: 700; 
    }
    
    .queue-count {
      font-size: 10px;
      color: var(--text-primary);
      font-weight: 800;
      background: rgba(59, 130, 246, 0.2);
      padding: 2px 6px;
      border-radius: 10px;
    }
    
    .queue-list { 
      padding: 8px; 
    }
    
    .queue-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      margin-bottom: 4px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    
    .queue-position {
      width: 22px;
      height: 22px;
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
      color: var(--accent);
      flex-shrink: 0;
    }
    
    .queue-item.event .queue-position {
      background: rgba(255, 107, 157, 0.2);
      border-color: #ff6b9d;
      color: #ff6b9d;
    }
    
    .event-tag {
      background: #ff6b9d;
      color: white;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 8px;
      font-weight: 700;
      margin-left: 4px;
    }
    
    .queue-info { 
      flex: 1; 
      min-width: 0;
    }
    
    .queue-username { 
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      line-height: 1.2;
    }
    
    .queue-meta {
      font-size: 10px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    
    .stats-footer {
      padding: 10px 14px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: var(--text-secondary);
    }
    
    .stat-item { 
      display: flex; 
      align-items: center; 
      gap: 5px; 
    }
    
    .stat-value { 
      color: var(--text-primary); 
      font-weight: 800; 
    }
    
    .empty-state { 
      text-align: center; 
      padding: 16px 14px; 
      color: var(--text-secondary); 
      font-size: 11px; 
    }
    
    .demo-notice {
      position: fixed;
      bottom: 10px;
      right: 10px;
      background: rgba(245, 158, 11, 0.9);
      color: #000;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="overlay-container">
    <div class="overlay-header">
      <div class="brand">
        <div class="brand-icon">🎴</div>
        <span>LIVE</span>
      </div>
      <div class="live-badge">
        <span class="live-dot"></span>
        LIVE
      </div>
    </div>
    
    <div class="current-section" id="current-section">
      <div class="section-label">Nu öppnas</div>
      <div class="current-user" id="current-user">@väntar...</div>
      <div class="current-products" id="current-products">
        <div class="current-product-row">Ingen order öppnas just nu</div>
      </div>
    </div>
    
    <div class="queue-section">
      <div class="queue-header">
        <span class="queue-title">Nästa i kö</span>
        <span class="queue-count" id="queue-count">0</span>
      </div>
      <div class="queue-list" id="queue-list">
        <div class="empty-state">Ingen kö just nu</div>
      </div>
    </div>
    
    <div class="stats-footer">
      <div class="stat-item">
        <span>⏱</span>
        <span>Est. <span class="stat-value" id="est-time">0 min</span></span>
      </div>
      <div class="stat-item">
        <span>✓</span>
        <span>Klara: <span class="stat-value" id="completed-count">0</span></span>
      </div>
    </div>
  </div>
  
  <div class="demo-notice">⚠️ DEMO</div>

  <script>
    const STORAGE_KEY = 'tcg_queue_demo';
    
    function getData() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          const parsed = JSON.parse(stored);
          if (!parsed.averageTimePerOrder) parsed.averageTimePerOrder = 5;
          return parsed;
        }
        return {queue: [], currentOrder: null, completed: 0, averageTimePerOrder: 5};
      } catch(e) {
        return {queue: [], currentOrder: null, completed: 0, averageTimePerOrder: 5};
      }
    }
    
    function loadData() {
      const data = getData();
      
      // Nuvarande order
      const currentSection = document.getElementById('current-section');
      const currentUser = document.getElementById('current-user');
      const currentProducts = document.getElementById('current-products');
      
      if (data.currentOrder) {
        currentSection.classList.remove('inactive');
        currentUser.textContent = data.currentOrder.username;
        currentProducts.innerHTML = `
          <div class="current-product-row">
            <span class="product-icon">📦</span>
            <span>${data.currentOrder.product}</span>
          </div>
        `;
      } else {
        currentSection.classList.add('inactive');
        currentUser.textContent = '@väntar...';
        currentProducts.innerHTML = '<div class="current-product-row">Ingen order öppnas just nu</div>';
      }
      
      // Kölista - visa alla ordrar inklusive events
      const waitingQueue = (data.queue || []).filter(o => o.status === 'waiting');
      document.getElementById('queue-count').textContent = waitingQueue.length;
      
      const queueList = document.getElementById('queue-list');
      
      if (waitingQueue.length === 0) {
        queueList.innerHTML = '<div class="empty-state">Ingen kö just nu</div>';
      } else 
        let html = '';
        for (let i = 0; i < Math.min(waitingQueue.length, 4); i++) {
          const order = waitingQueue[i];
          const isEvent = order.type === 'event';
          html += `
            <div class="queue-item ${isEvent ? 'event' : ''}">
              <div class="queue-position">${i + 1}</div>
              <div class="queue-info">
                <div class="queue-username">${order.username}${isEvent ? ' <span class="event-tag">EVENT</span>' : ''}</div>
                <div class="queue-meta">${order.product}</div>
              </div>
            </div>
          `;
        }
        queueList.innerHTML = html;
      }
      
      // Statistik - dynamisk tid
      const ripShipOnly = waitingQueue.filter(o => o.type === 'ripship');
      const totalPacksWaiting = ripShipOnly.length;
      const avgTime = data.averageTimePerOrder || 5;
      const estMin = totalPacksWaiting * avgTime;
      
      // Debug - logga värden för felsökning
      console.log('Overlay ETA:', estMin, 'min (avg:', avgTime, ', queue:', totalPacksWaiting, ')');
      document.getElementById('est-time').textContent = estMin + ' min';
      document.getElementById('completed-count').textContent = data.completed || 0;
    }

    // Ladda direkt och uppdatera var 3:e sekund
    loadData();
    setInterval(loadData, 3000);
    
    // 🔔 Lyssna på synk-signal från admin (direkt uppdatering)
    window.addEventListener('storage', function(e) {
      if (e.key === 'tcg_sync_trigger') {
        console.log('Overlay: Sync signal received from admin');
        loadData();
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCG Queue - Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #050505;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .logo { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 32px; margin-bottom: 12px; }
    p { color: #888; margin-bottom: 32px; max-width: 400px; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 16px 32px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 700;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: #1a1a1a; border: 1px solid #333; }
    .lang-switch {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      gap: 8px;
    }
    .lang-switch a {
      padding: 6px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      font-size: 12px;
      color: #888;
      text-decoration: none;
    }
    .lang-switch a.active { background: #3b82f6; color: white; }
    .demo-badge {
      position: fixed;
      top: 24px;
      right: 24px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      color: #f59e0b;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="demo-badge">⚠️ DEMO LÄGE</div>
  <div class="lang-switch">
    <a href="index.html" class="active">🇸🇪</a>
    <a href="index-en.html">🇬🇧</a>
  </div>
  
  <div class="logo">🎴</div>
  <h1>TCG Queue System</h1>
  <p>Demo-version med lokalt lagring. All data sparas bara i din webbläsare.</p>
  
  <div class="links">
    <a href="admin/index.html" class="btn">🎛️ Admin Panel</a>
    <a href="overlay/index.html" target="_blank" class="btn btn-secondary">📺 Overlay</a>
  </div>
</body>
</html>
